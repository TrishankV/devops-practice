# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  acrservicecon: 'tf-app'
  reponame: 'containerrepo'
  dockerpath: '$(Build.SourcesDirectory)/Dockerfile'
  buildcontext: '$(Build.SourcesDirectory)'



stages:
- stage: BuildandPush
  displayName: Build and Push Image
  jobs:
  - job: BuildandPush
    displayName: Build and Puch to Azure Container Registry
    pool:
      name : Virajpool
    steps:
    - task: Docker@2
      displayName: Build an image and push it in Azure container Registry 
      inputs:
        command: buildandPush
        dockerfile: $(dockerpath)
        containerRegistry: $(acrservicecon)
        repository: $(reponame)
        buildContext: $(buildcontext)
        tags: |
          $(tag)
